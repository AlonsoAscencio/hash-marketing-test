@if (campaigns().length === 0) {
  <div class="glass rounded-3xl p-10 text-center bg-bg-primary dark:bg-dark-bg-primary">
    <h3 class="text-xl font-bold">No se encontraron campañas</h3>
    <p class="text-text-secondary mt-2">Intenta limpiar los filtros o cambiar tu búsqueda.</p>
  </div>
} @else {
  <div
    class="grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-3 gap-6 items-start w-full min-w-0"
  >
    @for (campaign of campaigns(); track campaign.id) {
      <app-campaign-card class="block w-full min-w-0" [campaign]="campaign" (selected)="campaignSelected.emit($event)" />
    }
  </div>
}
